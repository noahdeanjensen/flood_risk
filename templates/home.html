<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Landing Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'San Francisco', Arial, sans-serif;
      background-color: #1d1d1d;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .header {
      width: 100%;
      height: 60px;
      background-color: #007aff;
      border-bottom: 5px solid #005bb5;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 24px;
    }

    .container {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      border-radius: 20px;
      background-color: #2c2c2c;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
      width: 350px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .button-container {
      display: flex;
      flex-direction: column;
    }

    .button-container a {
      text-decoration: none;
      width: 100%;
    }

    .button-container button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background-color: #007aff;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
      font-size: 16px;
    }

    .button-container button:hover {
      background-color: #005bb5;
    }
  </style>
</head>
<body>

  <!-- Main container with buttons -->
  <div class="container">
    <h1>Home Page</h1>
    <p>We are excited to have you here! Please log in to continue.</p>

    <div class="button-container">
      <a href="login_Page">
        <button>Consultant Login</button>
      </a>
      <a href="register.html">
        <button>Register</button>
      </a>
    </div>
  </div>

</body>
</html>
